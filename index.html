<!DOCTYPE html>
<html>
<body>
<pre id="out">testing...</pre>

<script>
fetch("https://api.cloudsmith.io/v1/user/self/", {
    credentials: "include"
})
.then(async r => {
    const text = await r.text();

    document.getElementById("out").innerText =
        "STATUS: " + r.status +
        "\n\nBODY:\n" + text;
})
.catch(e => {
    document.getElementById("out").innerText =
        "ERROR:\n" + e;
});
</script>
</body>
</html>
