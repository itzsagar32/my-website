<!DOCTYPE html>
<html>
<body>
<h1>Cloudsmith CORS Test01</h1>

<pre id="out"></pre>

<script>
fetch("https://app.cloudsmith.com/settings", {
    credentials: "include"
})
.then(r => r.text())
.then(t => {
    document.getElementById("out").innerText = t;
})
.catch(e => {
    document.getElementById("out").innerText = e;
});
</script>

</body>
</html>
