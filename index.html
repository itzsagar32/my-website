<!DOCTYPE html>
<html>
<body>
<h1>Cloudsmith Test03</h1>
<pre id="out">loading...</pre>

<script>
fetch("https://api.cloudsmith.io/status/check/basic/", {
    credentials: "include"
})
.then(r => {
    document.getElementById("out").innerText =
        "STATUS: " + r.status;
    return r.text();
})
.then(t => {
    document.getElementById("out").innerText +=
        "\n\nBODY:\n" + t;
})
.catch(e => {
    document.getElementById("out").innerText =
        "ERROR:\n" + e;
});
</script>

</body>
</html>
