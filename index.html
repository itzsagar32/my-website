<!DOCTYPE html>
<html>
<body>
<h1>Cloudsmith CORS Test 02</h1>
<pre id="out">Loading...</pre>

<script>
fetch("https://api.cloudsmith.io/v1/user/self/", {
    credentials: "include"
})
.then(r => {
    document.getElementById("out").innerText =
        "STATUS: " + r.status;

    return r.text();
})
.then(t => {
    document.getElementById("out").innerText +=
        "\n\nBODY:\n" + t;
})
.catch(e => {
    document.getElementById("out").innerText =
        "ERROR:\n" + e;
});
</script>

</body>
</html>
